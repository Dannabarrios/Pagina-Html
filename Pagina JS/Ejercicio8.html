<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 8 – Lista con eliminar</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    .fila { display: flex; gap: 10px; margin-top: 10px; }
    input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    button.agregar {
      padding: 8px 18px;
      background: #ffadd2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #f0f4ff;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    button.eliminar {
      padding: 5px 12px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    a { display: inline-block; margin-top: 30px; color: #ffadd2; }
  </style>
</head>
<body>
  <h1>Ejercicio 8 – Lista con eliminar</h1>

  <div class="fila">
    <input type="text" id="inputTarea" placeholder="Escribe una tarea">
    <button class="agregar" id="btnAgregar">Agregar</button>
  </div>

  <ul id="lista"></ul>

  <a href="index.html">← Volver al índice</a>

  <script src="Ejercicio8.js"></script>
</body>
</html>
