<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 7 – Calculadora básica</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    input, select {
      width: 100%;
      padding: 8px 12px;
      margin-top: 5px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      background: #ffadd2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #ffadd2; }
    #resultado { margin-top: 16px; font-size: 20px; font-weight: bold; color: #ffadd2; }
    a { display: inline-block; margin-top: 30px; color: #ffadd2; }
  </style>
</head>
<body>
  <h1>Ejercicio 7 – Calculadora básica</h1>

  <label>Número 1</label>
  <input type="number" id="num1" placeholder="Ej: 10">

  <label>Número 2</label>
  <input type="number" id="num2" placeholder="Ej: 4">

  <label>Operación</label>
  <select id="operacion">
    <option value="+">+ Suma</option>
    <option value="-">− Resta</option>
    <option value="*">× Multiplicación</option>
    <option value="/">÷ División</option>
  </select>

  <button id="btnCalc">Calcular</button>

  <p id="resultado"></p>

  <a href="index.html">← Volver al índice</a>

  <script src="Ejercicio7.js"></script>
</body>
</html>
