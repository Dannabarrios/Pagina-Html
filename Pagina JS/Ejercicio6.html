<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 6 – Validar formulario</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    input {
      width: 100%;
      padding: 8px 12px;
      margin-top: 5px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      background: #ffadd2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #ffadd2; }
    #mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
    }
    #mensaje.error { background: #ffe0e0; color: #c0392b; }
    #mensaje.ok    { background: #d5f5e3; color: #1e8449; }
    a { display: inline-block; margin-top: 30px; color: #ffadd2; }
  </style>
</head>
<body>
  <h1>Ejercicio 6 – Validar formulario</h1>

  <label>Nombre</label>
  <input type="text" id="nombre" placeholder="Tu nombre">

  <label>Correo</label>
  <input type="email" id="correo" placeholder="tu@correo.com">

  <label>Edad</label>
  <input type="number" id="edad" placeholder="Ej: 20">

  <button id="btnEnviar">Enviar</button>

  <div id="mensaje"></div>

  <a href="index.html">← Volver al índice</a>

  <script src="Ejercicio6.js"></script>
</body>
</html>
