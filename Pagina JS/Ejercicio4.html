<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 4 – Contador de clics</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; text-align: center; }
    #numero {
      font-size: 80px;
      font-weight: bold;
      color: #ffadd2;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 4px;
    }
    #btnContar  { background: #ffadd2; }
    #btnReset   { background: #aaa; }
    a { display: inline-block; margin-top: 30px; color: #ffadd2; }
  </style>
</head>
<body>
  <h1>Ejercicio 4 – Contador</h1>

  <div id="numero">0</div>

  <button id="btnContar">Hacer clic</button>
  <button id="btnReset">Reiniciar</button>

  <br>
  <a href="index.html">← Volver al índice</a>

  <script src="Ejercicio4.js"></script>
</body>
</html>
