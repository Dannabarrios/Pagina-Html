<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problema 4 – Carrito de Compras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">// problema-04 — carrito de compras</span>
  <a href="index.html">← Índice</a>
</div>

<div class="hero">
  <div class="badge">PROBLEMA 04</div>
  <h1>Carrito de <span>Compras</span></h1>
  <p>Agrega productos al carrito, elimínalos y consulta el total actualizado automáticamente.</p>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Agregar producto</div>
    <label>Nombre del producto</label>
    <input type="text" id="nombreProd" placeholder="Ej: Audífonos">
    <label>Precio</label>
    <input type="number" id="precioProd" placeholder="Ej: 80000">
    <button class="btn" id="btnAgregar">Agregar al carrito 🛒</button>
    <div id="msgAgregar" class="resultado"></div>
  </div>

  <div class="card" id="seccionCarrito" style="display:none">
    <div class="card-title">Mi carrito</div>
    <ul class="task-list" id="listaCarrito"></ul>
    <div id="totalCarrito" class="resultado ok"></div>
  </div>

</div>

<div style="max-width:640px;margin:0 auto;padding:0 20px">
  <a href="index.html" class="volver">← Volver al índice</a>
</div>

<script src="Problema4.js"></script>
</body>
</html>
